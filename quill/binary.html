<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary type</title>
</head>
<body>
    <form action="/restaraunt/pizza" method="post">
        <input id="toppling-1" type="checkbox" name="pine apple">
        <label for="toppling-1">Pineapple</label>
        <input  id="toppling-2" type="checkbox" name="cheese">
        <label for="toppling-2">Cheese</label>
        <input id="toppling-3" type="checkbox" name="chicken">
        <label for="toppling-3">Chicken</label>
        
<br><br>
        <input id="small" type="radio" name="size" value="s" >
        <label for="small">Small</label>
        <input id="medium" type="radio" name="size" value="m">
        <label for="medium">Medium</label>
        <input id="large" type="radio" name="size" value="l">
        <label for="large">Large</label>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
