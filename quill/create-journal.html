<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create journal</title>
</head>
<body>
    <h1>Create Journal</h1>
    <form action="/api/v1/journals" method="post">
        <label for="main-title">jounal title:</label>
    <input id="main-title" type="text" name = "title" placeholder="Enter title" minlength="3" required >
    <br> <br>
    <label for="journal-type">Journal Type</label>
    <select id="journal-type" name="type of journal" required !="none">
        <option value="none">None</option>
        <option value="idea">Idea</option>
        <option value="note">Note</option>
        <option value="goal">Goal</option>
        <option value="habit">Habit</option>
        <option value="memory">Memory</option>
        <option value="mood">Mood</option>
        <option value="event">Event</option>
        <option value="task">Task</option>
    </select>
    <br> <br>
    <label for="entry">Entry</label>
    <textarea name="Journal entry" id="entry" rows="5" cols="30" minlength="3" maxlength="10" required ></textarea>
<br>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
     </form>
</body>
</html>
